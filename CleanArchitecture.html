<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reader — CleanArchitecture</title>
  <style>
    /* Grundlayout: Header + iframe-Reader füllt Rest */
    html,body{height:100%;margin:0;font-family:system-ui,Arial,sans-serif;background:#f6f6f7;color:#111}
    .app{display:flex;flex-direction:column;height:100vh}
    header{
      padding:12px 16px;
      background:#fff;
      border-bottom:1px solid rgba(0,0,0,0.06);
      display:flex;
      gap:12px;
      align-items:center;
    }
    header h1{font-size:1rem;margin:0}
    header .actions{margin-left:auto;display:flex;gap:8px;align-items:center}
    .btn{padding:8px 10px;border-radius:6px;border:0;background:#1f6feb;color:#fff;cursor:pointer}
    .btn.secondary{background:#e9eefc;color:#08306b}
    main{flex:1;min-height:0;display:flex;flex-direction:column}
    .frame-wrap{flex:1;min-height:0;display:block} /* important for overflow in flex */
    iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#fff;
    }
    /* mobile: small adjustments */
    @media (max-width:720px){
      header{padding:10px}
      .btn{padding:7px 9px}
    }
    .note{font-size:.9rem;color:#444;margin-left:8px}
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>CleanArchitecture — Reader</h1>
      <div class="actions">
        <button id="openRaw" class="btn secondary" title="Öffne Original in neuem Tab">Original öffnen</button>
        <button id="reloadBtn" class="btn" title="Neu laden">Neu laden</button>
      </div>
      <div class="note" id="status">Lade Buch …</div>
    </header>

    <main>
      <div class="frame-wrap" id="frameWrap">
        <iframe id="bookFrame" sandbox="allow-same-origin allow-forms allow-scripts allow-popups"></iframe>
      </div>
    </main>
  </div>

  <script>
    // Konfiguration: Name der Buchdatei (im selben Ordner)
    const BOOK_FILE = 'CleanArchitecture.html';

    const iframe = document.getElementById('bookFrame');
    const statusEl = document.getElementById('status');
    const openRaw = document.getElementById('openRaw');
    const reloadBtn = document.getElementById('reloadBtn');

    // Hilfs: Basis-URL des Ordners (z.B. "/folder/")
    function getBaseHref() {
      const loc = window.location;
      // build directory base: protocol + '//' + host + path_to_dir/
      const path = loc.pathname;
      const dir = path.substring(0, path.lastIndexOf('/') + 1);
      return loc.origin + dir;
    }

    // Versuche fetch -> wenn erfolgreich, füge <base> ein und lade über Blob-URL (vermeidet X-Frame-Options beim direkten iframe-load)
    async function loadBookIntoIframe() {
      statusEl.textContent = 'Buch per fetch laden…';
      try {
        const res = await fetch(BOOK_FILE, {cache: 'no-cache'});
        if (!res.ok) throw new Error('HTTP ' + res.status);
        let html = await res.text();

        // Wenn das HTML bereits ein <base> hat, ersetzen wir es; sonst einfügen
        const baseHref = getBaseHref();
        // sicherstellen, dass baseHref endet mit '/'
        const normalizedBase = baseHref.endsWith('/') ? baseHref : baseHref + '/';
        if (/<base\s+/i.test(html)) {
          html = html.replace(/<base\s+[^>]*>/i, `<base href="${normalizedBase}">`);
        } else {
          // Insert base nach <head> falls vorhanden, sonst vor dem Dokument
          if (/<head[^>]*>/i.test(html)) {
            html = html.replace(/<head([^>]*)>/i, `<head$1><base href="${normalizedBase}">`);
          } else {
            html = `<head><base href="${normalizedBase}"></head>` + html;
          }
        }

        // Optional: remove CSP meta tags that block inline scripts if needed (vorsichtig)
        // html = html.replace(/<meta[^>]*http-equiv=["']Content-Security-Policy["'][^>]*>/ig, '');

        // Create blob and set iframe src to blob URL
        const blob = new Blob([html], {type: 'text/html'});
        const blobUrl = URL.createObjectURL(blob);

        // Clean previous src
        iframe.removeAttribute('srcdoc');
        iframe.src = blobUrl;

        statusEl.textContent = 'Buch geladen (fetch → blob).';
        // revoke blob after iframe loaded to free memory
        iframe.onload = () => {
          try { URL.revokeObjectURL(blobUrl); } catch(e){/*ignore*/ }
        };
      } catch (err) {
        console.warn('Fetch failed, fallback to direct iframe src:', err);
        statusEl.textContent = 'Fetch fehlgeschlagen, lade direktes Dokument (Fallback).';
        // Fallback: direkte Einbettung (funktioniert wenn keine X-Frame-Options blockieren und gleiche Origin)
        iframe.src = BOOK_FILE;
        // Prüfe nach kurzer Zeit, ob iframe geladen wurde (onload) oder Fehler
        let loaded = false;
        iframe.onload = () => { loaded = true; statusEl.textContent = 'Buch geladen (direkte Einbettung).'; };
        setTimeout(()=> {
          if (!loaded) {
            statusEl.textContent = 'Einbettung möglicherweise blockiert (X-Frame-Options). Öffne Original in neuem Tab.';
          }
        }, 1500);
      }
    }

    // Buttons
    openRaw.addEventListener('click', ()=> window.open(BOOK_FILE, '_blank', 'noopener'));
    reloadBtn.addEventListener('click', ()=> {
      statusEl.textContent = 'Neu laden…';
      // reload logic: try fetch first again
      loadBookIntoIframe();
    });

    // Beim ersten Laden ausführen
    window.addEventListener('load', ()=> {
      // Wenn Seite via file:// geöffnet wird, fetch kann fehlschlagen — trotzdem probieren
      loadBookIntoIframe();
    });

    // Hinweis: Falls du lokal testest, benutze einen HTTP-Server:
    // python -m http.server 8000  oder VS Code Live Server
  </script>
</body>
</html>
