<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mein Buch — Reader</title>
  <style>
    :root{
      --sidebar-w: 300px;
      --accent: #1f6feb;
      --bg: #fafafa;
      --text: #222;
      --content-max: 860px;
    }
    html,body{height:100%;margin:0;font-family:system-ui, "Segoe UI", Roboto, Arial; color:var(--text); background:var(--bg);}
    .layout{display:grid;grid-template-columns: var(--sidebar-w) 1fr; height:100vh; gap:0;}

/* Sidebar */
    .sidebar{background:#fff;border-right:1px solid rgba(0,0,0,0.06);padding:16px;overflow:auto}
    .sidebar h1{font-size:1.1rem;margin:0 0 8px}
    .toc{list-style:none;padding:0;margin:8px 0 0}
    .toc li{margin:6px 0}
    .toc a{color:var(--accent);text-decoration:none;font-size:0.95rem}
    .toc a.level-2{padding-left:10px;font-size:0.92rem;color:#0b62c9}
    .toc a.level-3{padding-left:18px;font-size:0.9rem;color:#084a9a}
    .controls{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
    .btn{background:var(--accent);color:#fff;border:none;padding:8px 12px;border-radius:6px;cursor:pointer}
    .btn.secondary{background:#f0f0f0;color:#222}
    .search{width:100%;padding:8px;border:1px solid #ddd;border-radius:6px}

/* Main reader */
    .reader{display:flex;flex-direction:column;min-height:0}
    header.reader-header{padding:18px 20px;border-bottom:1px solid rgba(0,0,0,0.06);background:linear-gradient(180deg, #fff, #fbfbfb)}
    header.reader-header .meta{display:flex;gap:10px;align-items:center}
    header.reader-header h2{margin:0;font-size:1.05rem}
    .content-wrap{padding:28px;overflow:auto;flex:1;display:flex;justify-content:center}
    .content{max-width:var(--content-max);background:#fff;padding:28px;border-radius:4px;box-shadow:0 8px 30px rgba(0,0,0,0.04);min-width:300px}
    .content img{max-width:100%;height:auto}
    .content h1, .content h2, .content h3{color:var(--text);margin-top:1.2em}
    .content p{line-height:1.6;margin:.6em 0}
    .nav-bottom{display:flex;justify-content:space-between;margin-top:20px;gap:10px}

/* small screens: hide sidebar, top toggle */
    @media (max-width:880px){
      .layout{grid-template-columns: 1fr; }
      .sidebar{position:fixed;left:0;top:0;bottom:0;width:80%;max-width:320px;transform:translateX(-110%);transition:transform .25s ease;z-index:40}
      .sidebar.open{transform:translateX(0)}
      .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.2);display:none;z-index:30}
      .overlay.show{display:block}
      .content-wrap{padding:14px}
      header.reader-header{display:flex;justify-content:space-between;align-items:center}
    }

    /* accessibility focus */
    a:focus,button:focus{outline:3px solid rgba(31,111,235,0.18);outline-offset:2px}
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <h1>Inhalt</h1>
      <input id="toc-search" class="search" placeholder="Suchen (Kapitel)..." aria-label="Inhaltsverzeichnis suchen">
      <ul id="toc" class="toc" role="navigation"></ul>

      <div class="controls">
        <button id="prevBtn" class="btn secondary">Zurück</button>
        <button id="nextBtn" class="btn">Weiter</button>
        <button id="togglePaginate" class="btn secondary">Zweispaltig</button>
        <button id="openSidebarMobile" class="btn secondary" style="display:none">TOC</button>
      </div>

      <p style="margin-top:12px;font-size:.9rem;color:#444">Das Buch wird aus <code>CleanArchitecture.html</code> geladen. Platziere beide Dateien im selben Ordner.</p>
    </aside>

    <main class="reader" id="reader">
      <header class="reader-header">
        <div class="meta">
          <h2 id="bookTitle">Lade Buch …</h2>
        </div>
        <div style="margin-left:auto">
          <button id="openTocMobile" class="btn secondary" style="display:none">Inhalt</button>
        </div>
      </header>

      <div class="content-wrap">
        <article id="bookContent" class="content" tabindex="0">
          <!-- Buch-Inhalt wird hier geladen -->
          <p style="color:#666">Bitte warten — Buch wird geladen...</p>
        </article>
      </div>
    </main>
  </div>

  <div id="overlay" class="overlay"></div>

  <script>
    // Konfiguration: Name der Buchdatei (im gleichen Ordner)
    const BOOK_FILE = 'CleanArchitecture.html';

    const bookContent = document.getElementById('bookContent');
    const tocEl = document.getElementById('toc');
    const bookTitleEl = document.getElementById('bookTitle');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const paginateBtn = document.getElementById('togglePaginate');
    const tocSearch = document.getElementById('toc-search');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');

    let headings = []; // Array of headings (for prev/next)
    let currentIndex = 0;
    let paginated = false;

    // Lade book.html per fetch und injiziere Inhalt
    async function loadBook(){
      try{
        const res = await fetch(BOOK_FILE, {cache: "no-cache"});
        if(!res.ok) throw new Error('Fehler beim Laden: ' + res.status);
        const text = await res.text();

        // Wir parsen das HTML, damit IDs gesetzt und TOC erstellt werden können
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');

        // Optional: Titel aus <title> oder h1 entnehmen
        const title = doc.querySelector('title')?.textContent || doc.querySelector('h1')?.textContent || 'Buch';
        bookTitleEl.textContent = title;

        // Kopiere den Body-Inhalt in unseren Artikel
        // (wir entfernen scripts aus book.html aus Sicherheitsgründen)
        const safeClone = doc.body.cloneNode(true);
        safeClone.querySelectorAll('script').forEach(s=>s.remove());

        // Wenn Überschriften keine IDs haben, erstelle eindeutige IDs
        const hs = safeClone.querySelectorAll('h1,h2,h3');
        hs.forEach((h,i)=>{
          if(!h.id) h.id = 'chap-' + i + '-' + h.textContent.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-');
        });

        // Setze den Inhalt
        bookContent.innerHTML = '';
        Array.from(safeClone.childNodes).forEach(n => bookContent.appendChild(n));

        // Baue TOC
        buildToc();

        // Set initial focus to first heading
        headings = Array.from(bookContent.querySelectorAll('h1,h2,h3'));
        if(headings.length) {
          currentIndex = 0;
          updateNavButtons();
        } else {
          prevBtn.disabled = true;
          nextBtn.disabled = true;
        }

        // Wenn der URL-Hash gesetzt ist, springe dort hin
        if(location.hash){
          const target = document.querySelector(location.hash);
          if(target) target.scrollIntoView({behavior:'smooth',block:'start'});
        }
      }catch(err){
        bookContent.innerHTML = '<p style="color:#900">Fehler beim Laden des Buches: ' + err.message + '</p>';
        console.error(err);
      }
    }

    function buildToc(){
      tocEl.innerHTML = '';
      const allHeadings = bookContent.querySelectorAll('h1,h2,h3');
      allHeadings.forEach(h=>{
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.textContent = h.textContent;
        a.href = '#' + h.id;
        a.className = 'level-' + (h.tagName.toLowerCase().slice(1)); // level-1/2/3
        a.addEventListener('click', (e)=>{
          e.preventDefault();
          sidebar.classList.remove('open');
          overlay.classList.remove('show');
          document.querySelector('#' + h.id).scrollIntoView({behavior:'smooth',block:'start'});
        });
        li.appendChild(a);
        tocEl.appendChild(li);
      });

      // Filtern der TOC mit Eingabe
      tocSearch.oninput = () => {
        const q = tocSearch.value.trim().toLowerCase();
        Array.from(tocEl.children).forEach(li=>{
          const txt = li.textContent.trim().toLowerCase();
          li.style.display = (!q || txt.includes(q)) ? '' : 'none';
        });
      };
    }

    function updateNavButtons(){
      prevBtn.disabled = currentIndex <= 0;
      nextBtn.disabled = currentIndex >= headings.length - 1;
    }

    prevBtn.addEventListener('click', ()=>{
      if(currentIndex > 0){
        currentIndex--;
        headings[currentIndex].scrollIntoView({behavior:'smooth',block:'start'});
        updateNavButtons();
        location.hash = '#' + headings[currentIndex].id;
      }
    });

    nextBtn.addEventListener('click', ()=>{
      if(currentIndex < headings.length - 1){
        currentIndex++;
        headings[currentIndex].scrollIntoView({behavior:'smooth',block:'start'});
        updateNavButtons();
        location.hash = '#' + headings[currentIndex].id;
      }
    });

    // Track current heading while scrolling (simple)
    const observer = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){
          const idx = headings.indexOf(e.target);
          if(idx >= 0){
            currentIndex = idx;
            updateNavButtons();
          }
        }
      });
    }, {root: document.querySelector('.content-wrap'), rootMargin: '0px 0px -40% 0px', threshold: 0.1});

    function observeHeadings(){
      headings.forEach(h=>observer.observe(h));
    }

    // Paginated / Zweispaltig Toggle (nutzt CSS columns)
    paginateBtn.addEventListener('click', ()=>{
      paginated = !paginated;
      if(paginated){
        bookContent.style.columnGap = '40px';
        bookContent.style.columnWidth = '40ch';
        bookContent.style.whiteSpace = 'normal';
        paginateBtn.textContent = 'Einspaltig';
      } else {
        bookContent.style.columnGap = '';
        bookContent.style.columnWidth = '';
        paginateBtn.textContent = 'Zweispaltig';
      }
    });

    // Mobile sidebar (einfache Logik)
    function setupMobile(){
      const mq = window.matchMedia('(max-width:880px)');
      const openBtn = document.getElementById('openTocMobile');
      const openSidebarMobile = document.getElementById('openSidebarMobile');

      function updateUI(){
        if(mq.matches){
          // show mobile controls
          openBtn.style.display = 'inline-block';
          openSidebarMobile.style.display = 'inline-block';
          // add listeners
          openBtn.onclick = ()=>{ sidebar.classList.add('open'); overlay.classList.add('show'); }
          openSidebarMobile.onclick = ()=>{ sidebar.classList.add('open'); overlay.classList.add('show'); }
          overlay.onclick = ()=>{ sidebar.classList.remove('open'); overlay.classList.remove('show'); };
        } else {
          openBtn.style.display = 'none';
          openSidebarMobile.style.display = 'none';
          sidebar.classList.remove('open');
          overlay.classList.remove('show');
        }
      }
      mq.addListener(updateUI);
      updateUI();
    }

    // Wenn die Seite geladen hat, fetch starten
    window.addEventListener('load', async ()=>{
      await loadBook();
      headings = Array.from(bookContent.querySelectorAll('h1,h2,h3'));
      if(headings.length) observeHeadings();
      setupMobile();

      // allow keyboard navigation
      document.addEventListener('keydown', (e)=>{
        if(e.key === 'ArrowRight') nextBtn.click();
        if(e.key === 'ArrowLeft') prevBtn.click();
      });
    });
  </script>
</body>
</html>
