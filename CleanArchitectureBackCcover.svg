      <rect x="0" y="0" width="880" height="520" rx="18" fill="#0E1730" opacity="0.75" stroke="#2A3A66" stroke-width="2"/>
      <text x="40" y="70" class="mono" font-size="30" fill="#D6E6FF" opacity="0.9">BARCODE / ISBN</text>
      <rect x="40" y="110" width="800" height="360" fill="#0B1220" opacity="0.85" stroke="#2A3A66" stroke-width="2"/>
      <g transform="translate(60, 140)" opacity="0.85">
        <rect x="0" y="0" width="8" height="300" fill="#EAF2FF"/>
